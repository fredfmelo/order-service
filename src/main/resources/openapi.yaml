openapi: 3.0.3

info:
  title: Order Service API
  version: 1.0.0

servers:
  - url: http://localhost:8080

paths:

  /orders:
    post:
      tags:
        - Order
      summary: Create order
      operationId: createOrder

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'

      responses:
        '201':
          description: Order created

          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'

components:

  schemas:

    CreateOrderRequest:
      type: object

      required:
        - items

      properties:
        items:
          type: array
          minItems: 1

          items:
            $ref: '#/components/schemas/OrderItem'

    OrderItem:
      type: object

      required:
        - productId
        - quantity

      properties:

        productId:
          type: string
          format: uuid

        quantity:
          type: integer
          minimum: 1

    CreateOrderResponse:
      type: object

      properties:

        orderId:
          type: string
          format: uuid

        status:
          $ref: '#/components/schemas/OrderStatus'

    OrderStatus:
      type: string

      enum:
        - CREATED
        - PAYMENT_PENDING